test_login_user:
  - name: "正确用户名密码"
    username: "member"
    password: "member123"
    expect_code: 200
    expect_msg: "操作成功"

  - name: "用户名不存在"
    username: "me1mber"
    password: "member123"
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "密码错误"
    username: "member"
    password: "member1234"
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "用户名为空"
    username: ""
    password: "member123"
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "密码为空"
    username: "member"
    password: ""
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "错误例子"
    username: "member"
    password: ""
    expect_code: 200
    expect_msg: "用户名或密码错误"

login_user:
  - ['member', 'member123']
  - ['test', '123456']