test_login_user:
  - name: "正确用户名密码"
    username: "test_member111"
    password: "123456"
    expect_code: 200
    expect_msg: "操作成功"

  - name: "用户名不存在"
    username: "me1mber"
    password: "member123"
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "密码错误"
    username: "member"
    password: "member1234"
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "用户名为空"
    username: ""
    password: "member123"
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "密码为空"
    username: "member"
    password: ""
    expect_code: 404
    expect_msg: "用户名或密码错误"

  - name: "错误例子"
    username: "member"
    password: ""
    expect_code: 200
    expect_msg: "用户名或密码错误"

test_info:
  - name: "用户信息"
    username: "member"
    password: "member123"
    expect_code: 200
    expect_msg: "操作成功"

  - name: "未登录查询用户信息"
    username: "memb222er"
    password: "member123"
    expect_code: 401
    expect_msg: "暂未登录或token已经过期"

