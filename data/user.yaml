test_update_password:
  - name: "修改密码成功"
    telephone:
    password: "newpassword"
    expect_code: 200
    expect_msg: "密码修改成功"

  - name: "修改空密码"
    telephone:
    password: ""
    expect_code: 500
    expect_msg: "密码不能为空"

  - name: "其他手机号"
    telephone: "01234567890"
    password: "newpassword"
    expect_code: 500
    expect_msg: "登录失败"

  - name: "空验证码"
    telephone:
    password: "newpassword"
    authCode: ""
    expect_code: 500
    expect_msg: "验证码错误"



